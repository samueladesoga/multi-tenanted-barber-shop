# Staging environment overrides — runs on the SAME VPS as production.
# Deep-merged with config/deploy.yml by Kamal when you pass -d staging.
#
# Usage:
#   kamal setup    -d staging   # first-time bootstrap
#   kamal deploy   -d staging   # deploy to staging
#   kamal rollback -d staging   # roll back staging
#
# Secrets are read from .kamal/secrets.staging instead of .kamal/secrets.

servers:
  web:
    hosts:
      - 178.104.221.97   # ← same Hetzner VPS as production
    # Staging app binds to port 3001 to avoid conflicting with production (3000)
    options:
      publish:
        - "127.0.0.1:3001:80"

env:
  clear:
    APP_HOST: staging.barberapp.club
    RAILS_LOG_LEVEL: debug
    RAILS_ENV: production

accessories:
  db:
    # Same server, different host port (5433) to avoid conflicting with production (5432)
    host: 178.104.221.97
    port: "127.0.0.1:5433:5432"
    env:
      secret:
        - STAGING_POSTGRES_PASSWORD
      clear:
        POSTGRES_USER: barberapp
        POSTGRES_DB: barberapp_staging
