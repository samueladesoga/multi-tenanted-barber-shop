# Nginx config for staging.barberapp.club — wildcard subdomain staging environment.
#
# Prerequisites on the staging server (handled by script/server_setup.sh DOMAIN=staging.barberapp.club):
#   - Nginx installed
#   - Wildcard Let's Encrypt cert at /etc/letsencrypt/live/staging.barberapp.club/
#     obtained via: certbot certonly --dns-hetzner -d staging.barberapp.club -d *.staging.barberapp.club
#   - App container running on 127.0.0.1:3000 (kamal deploy -d staging)
#
# Install on the staging server:
#   sudo cp barberapp-staging.conf /etc/nginx/sites-available/barberapp-staging
#   sudo ln -s /etc/nginx/sites-available/barberapp-staging /etc/nginx/sites-enabled/barberapp-staging
#   sudo nginx -t && sudo systemctl reload nginx

upstream barberapp_staging {
  server 127.0.0.1:3001;
  keepalive 32;
}

# Redirect all plain HTTP to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name staging.barberapp.club *.staging.barberapp.club;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS — wildcard cert covers all staging tenant subdomains
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name staging.barberapp.club *.staging.barberapp.club;

  ssl_certificate     /etc/letsencrypt/live/staging.barberapp.club/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/staging.barberapp.club/privkey.pem;

  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache         shared:SSL:10m;
  ssl_session_timeout       1d;
  ssl_stapling              on;
  ssl_stapling_verify       on;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;

  client_max_body_size 10m;

  location / {
    proxy_pass         http://barberapp_staging;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Connection        "";

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
