# Nginx config for barberapp.com — wildcard subdomain multi-tenant app.
#
# Prerequisites on the server (handled by script/server_setup.sh):
#   - Nginx installed
#   - Wildcard Let's Encrypt cert at /etc/letsencrypt/live/barberapp.com/
#     obtained via: certbot certonly --dns-<provider> -d barberapp.com -d *.barberapp.com
#   - App container running on 127.0.0.1:3000 (Kamal deploy)
#
# Install:
#   sudo cp config/nginx/barberapp.conf /etc/nginx/sites-available/barberapp
#   sudo ln -s /etc/nginx/sites-available/barberapp /etc/nginx/sites-enabled/barberapp
#   sudo nginx -t && sudo systemctl reload nginx

# Upstream — Kamal publishes the app on localhost:3000
upstream barberapp {
  server 127.0.0.1:3000;
  keepalive 32;
}

# Redirect all plain HTTP to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name barberapp.com *.barberapp.com;

  # Let Certbot renewal challenges through
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS — wildcard cert covers all tenant subdomains
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name barberapp.com *.barberapp.com;

  # Wildcard Let's Encrypt certificate (DNS-01 challenge, see server_setup.sh)
  ssl_certificate     /etc/letsencrypt/live/barberapp.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/barberapp.com/privkey.pem;

  # Modern TLS settings
  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache         shared:SSL:10m;
  ssl_session_timeout       1d;
  ssl_stapling              on;
  ssl_stapling_verify       on;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-XSS-Protection "1; mode=block" always;

  # Upload size — adjust if customers will upload photos etc.
  client_max_body_size 10m;

  # Proxy to app container
  location / {
    proxy_pass         http://barberapp;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Connection        "";

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # Serve precompiled assets directly from the container volume (optional optimisation)
  # If you want Nginx to serve assets, copy the public/assets path into a shared volume
  # and add a root + try_files here. For now, Rails/Thruster handles it.
}
